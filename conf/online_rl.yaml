defaults:
  - base
  - _self_

run_name: ${stage_to_run_name.online_rl}
base_model: ${stage_to_model.${online_rl.base_model}}

build_dataset:
  dataset_size: ${online_rl.dataset_size}
  num_shots: ${online_rl.num_shots}

training_arguments:
  # TrainingArguments
  per_device_train_batch_size: 2
  num_train_epochs: 10
  # https://arxiv.org/pdf/2510.13786
  learning_rate: 5e-7
  lr_scheduler_type: constant
  warmup_steps: 100
  weight_decay: 0.01
  adam_epsilon: 1e-15
  gradient_accumulation_steps: 4
  per_device_eval_batch_size: 16
  # GRPOConfig
  num_generations: 16
  max_completion_length: 16384
  generation_batch_size: 16
  generation_kwargs: ${llm.generation_kwargs}
  use_vllm: true
  vllm_mode: server
  vllm_server_host: trig0002
  epsilon: 0.2
  epsilon_high: 0.28
  loss_type: dapo
  mask_truncated_completions: true
