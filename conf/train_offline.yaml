defaults:
  - base
  - _self_

run_name: "${hydra:runtime.choices.llm}/\
  ${task_name}/d${dataset_size}_s${num_shots}/\
  c${num_candidates}_p${num_permutations}/train_offline"

dataset:
  task_name: ${task_name}
  dataset_size: ${dataset_size}
  val_size: 0.2
  random_state: 42
  # offline RL
  response_fraction: 0.2
  num_candidates: ${num_candidates}
  num_shots: ${num_shots}
  num_permutations: ${num_permutations}

trainer_args:
  output_dir: outputs/${run_name}
  eval_strategy: epoch
  # training
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 2
  learning_rate: 1e-6
  num_train_epochs: 10
  lr_scheduler_type: linear
  # saving
  save_strategy: best
  save_total_limit: 1
  # evaluation
  seed: 42
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false
  # logging
  report_to: wandb
  # SFTConfig
  model_init_kwargs:
    dtype: bfloat16
  max_length: null
